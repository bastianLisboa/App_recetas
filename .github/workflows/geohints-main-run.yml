name: Build GeoHints V10 atlas on main
on:
  push:
    paths:
      - '.github/workflows/geohints-main-run.yml'
concurrency:
  group: geohints-main-atlas
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Publish run marker
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import json,os
          from datetime import datetime,timezone
          data={'run_id':int(os.environ['RUN_ID']),'run_attempt':int(os.environ['RUN_ATTEMPT']),'head_sha':os.environ['HEAD_SHA'],'status':'started','updated_at':datetime.now(timezone.utc).isoformat(),'artifact_name':'Guia_GeoHints_V10_Atlas_Fotografico_Completo_Main'}
          open('geohints_run_status.json','w',encoding='utf-8').write(json.dumps(data,ensure_ascii=False,indent=2))
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add geohints_run_status.json
          git commit -m "Record GeoHints build run $RUN_ID"
          git push
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core
          pip install requests pillow reportlab pypdf pycountry Babel
      - name: Download verified builder sources
        run: |
          mkdir -p geohints
          base='https://raw.githubusercontent.com/bastianLisboa/App_recetas/geohints-public-build-20260628/geohints'
          for file in part1.py part2a.py part2b_v2.b64 part2c_v3.b64 part2d_v2.b64 part3.b64 part4a.b64 part4b.b64 merge.py; do
            curl --fail --location --retry 5 --retry-delay 3 "$base/$file" --output "geohints/$file"
          done
      - name: Assemble V2 builder
        working-directory: geohints
        run: |
          cat part1.py part2a.py > build.py
          base64 -d part2b_v2.b64 >> build.py
          base64 -d part2c_v3.b64 >> build.py
          base64 -d part2d_v2.b64 >> build.py
          base64 -d part3.b64 >> build.py
          cat part4a.b64 part4b.b64 | base64 -d >> build.py
          python -m py_compile build.py
      - name: Build all 25 batches with four workers
        working-directory: geohints
        run: |
          cat > orchestrate.py <<'PY'
          import os,subprocess,sys
          from concurrent.futures import ThreadPoolExecutor,as_completed
          from pathlib import Path
          Path('logs').mkdir(exist_ok=True)
          def run(i):
              env=os.environ.copy();env['BATCH_ID']=str(i);env['BATCH_SIZE']='10'
              with open(f'logs/batch-{i:02d}.log','w',encoding='utf-8') as log:
                  p=subprocess.run([sys.executable,'build.py'],env=env,stdout=log,stderr=subprocess.STDOUT)
              return i,p.returncode
          failures=[]
          with ThreadPoolExecutor(max_workers=4) as ex:
              futures=[ex.submit(run,i) for i in range(25)]
              for future in as_completed(futures):
                  i,code=future.result();print({'batch':i,'returncode':code},flush=True)
                  if code:failures.append(i)
          if failures:raise SystemExit(f'Failed batches: {failures}')
          PY
          python orchestrate.py
      - name: Validate all batches
        working-directory: geohints
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from pypdf import PdfReader
          exact=contextual=missing=unique=reused=0
          for i in range(25):
              d=Path('out')/f'batch-{i:02d}'
              p=d/f'GeoHints_Fotos_Batch_{i:02d}.pdf'
              a=json.loads((d/f'GeoHints_Auditoria_Batch_{i:02d}.json').read_text(encoding='utf-8'))
              assert a['batch_size']==10 and a['total_cards']==520
              assert a['missing_photos']==0
              assert a['exact_photos']+a['contextual_country_photos']==520
              assert a['generated_or_illustrated_images']==0
              assert len(PdfReader(str(p)).pages)==101
              exact+=a['exact_photos'];contextual+=a['contextual_country_photos'];missing+=a['missing_photos'];unique+=a['unique_photos'];reused+=a['reused_cards']
          print({'exact':exact,'contextual':contextual,'missing':missing,'unique':unique,'reused':reused})
          PY
      - name: Merge complete atlas
        working-directory: geohints
        env:
          DOWNLOAD_DIR: out
        run: python merge.py
      - name: Validate complete atlas
        working-directory: geohints
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from pypdf import PdfReader
          d=Path('final');p=d/'Guia_GeoHints_V10_Atlas_Fotografico_250_Paises.pdf'
          a=json.loads((d/'Guia_GeoHints_V10_Auditoria_Global.json').read_text(encoding='utf-8'))
          assert a['countries_and_territories']==250
          assert a['total_reference_cards']==13000
          assert a['cards_without_verified_photo']==0
          assert a['exact_country_category_photos']+a['contextual_real_photos_from_correct_country']==13000
          assert a['generated_or_illustrated_images']==0
          assert len(PdfReader(str(p)).pages)==2525
          print({'bytes':p.stat().st_size,'pages':a['pdf_pages'],'exact':a['exact_country_category_photos'],'contextual':a['contextual_real_photos_from_correct_country'],'missing':a['cards_without_verified_photo'],'unique':a['unique_photos'],'reused':a['reused_cards']})
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: Guia_GeoHints_V10_Atlas_Fotografico_Completo_Main
          path: |
            geohints/final/
            geohints/logs/
          retention-days: 7
          compression-level: 6
      - name: Publish final run marker
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          HEAD_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          git pull --rebase
          python - <<'PY'
          import json,os
          from datetime import datetime,timezone
          from pathlib import Path
          data={'run_id':int(os.environ['RUN_ID']),'run_attempt':int(os.environ['RUN_ATTEMPT']),'head_sha':os.environ['HEAD_SHA'],'status':os.environ['JOB_STATUS'],'updated_at':datetime.now(timezone.utc).isoformat(),'artifact_name':'Guia_GeoHints_V10_Atlas_Fotografico_Completo_Main'}
          audit=Path('geohints/final/Guia_GeoHints_V10_Auditoria_Global.json')
          if audit.exists():
              source=json.loads(audit.read_text(encoding='utf-8'))
              for key in ['countries_and_territories','total_reference_cards','exact_country_category_photos','contextual_real_photos_from_correct_country','cards_without_verified_photo','unique_photos','reused_cards','generated_or_illustrated_images','pdf_pages']:
                  data[key]=source.get(key)
          Path('geohints_run_status.json').write_text(json.dumps(data,ensure_ascii=False,indent=2),encoding='utf-8')
          PY
          git add geohints_run_status.json
          git commit -m "Update GeoHints build run $RUN_ID status" || true
          git push
